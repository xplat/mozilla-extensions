<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Viewer</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>

  <!-- PICK SCREEN (no dir param in URL) -->
  <div id="pick-screen" class="hidden">
    <div class="splash-inner">
      <div class="splash-title">Media Viewer</div>
      <p class="splash-desc">
        Open a directory with <code>media-open&nbsp;/path/to/dir</code> from the
        command line, or paste a viewer URL into the address bar.
      </p>
    </div>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="hidden">
    <div class="splash-inner">
      <div class="splash-title">Media Viewer</div>
      <div id="loading-status" class="loading-status">Loading…</div>
      <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
    </div>
  </div>

  <!-- ERROR SCREEN -->
  <div id="error-screen" class="hidden">
    <div class="splash-inner">
      <div class="splash-title error-title">Error</div>
      <div id="error-message" class="error-message">Unknown error.</div>
    </div>
  </div>

  <!-- VIEWER SCREEN -->
  <div id="viewer-screen" class="hidden" data-focus="list">

    <!-- MAIN AREA: selector + image (fills full height) -->
    <div id="main-area">

      <!-- LEFT: drawer for list sidebars -->
      <div id="list-drawer">

        <!-- LEFT: file selector -->
        <div class="list-pane" id="selector-pane">
          <div id="selector-header" class="list-header">
            <span id="dir-path" class="list-header-title" title=""></span>
          </div>
          <div class="list-list" id="file-list"></div>
          <div id="selector-footer">
            <button id="btn-recursive" title="Recursive listing">REC</button>
            <button id="btn-hidden"    title="Show hidden files (.)">HID</button>
            <button id="btn-sort"      title="Sort order">NAME</button>
          </div>
        </div>

        <!-- LEFT (audio queue mode): audio playlist replaces selector -->
        <div class="list-pane" id="audio-queue-pane">
          <div id="audio-queue-header" class="list-header">
            <span class="list-header-title">AUDIO QUEUE</span>
            <button id="audio-queue-clear-btn" class="mode-btn" title="Clear audio queue">CLR</button>
          </div>
          <div class="list-list" id="audio-queue-list"></div>
        </div>

        <!-- LEFT (video queue mode): video playlist replaces selector -->
        <div class="list-pane" id="video-queue-pane">
          <div id="video-queue-header" class="list-header">
            <span class="list-header-title">VIDEO QUEUE</span>
            <button id="video-queue-clear-btn" class="mode-btn" title="Clear video queue">CLR</button>
          </div>
          <div class="list-list" id="video-queue-list"></div>
        </div>

        <!-- DIVIDER: drag to resize panes -->
        <div id="pane-divider"></div>
      </div>

      <!-- RIGHT: image / video / audio display -->
      <div id="image-pane" data-mode="other" data-show="no-image-hint">

        <!-- Transform host: sized to image visual bounding box (image mode) -->
        <div id="transform-host">
          <img id="main-image" alt="" draggable="false" />
        </div>

        <!-- Video element (video / gif-loop mode) -->
        <video id="main-video" preload="metadata" draggable="false" crossorigin="anonymous"></video>

        <!-- Audio element (audio mode, not visible) -->
        <audio id="main-audio" preload="metadata" crossorigin="anonymous"></audio>

        <!-- Audio-mode placeholder -->
        <div id="audio-placeholder"><span>♪</span></div>

        <!-- Video / audio controls overlay -->
        <div id="video-controls">
          <div id="video-progress">
            <div id="video-seek-fill"></div>
          </div>
          <div id="video-hud">
            <span id="video-time"></span>
            <span id="video-vol"></span>
          </div>
        </div>

        <!-- Spinner -->
        <div id="img-spinner" class="img-spinner hidden">
          <div class="spinner-ring"></div>
        </div>

        <!-- Error-content display: shown by ErrorContent occupant via content-active.
             Inner content (message + retry button) is created/destroyed by
             ErrorContent.load() / cleanup() respectively. -->
        <div id="error-content"></div>

        <!-- Info overlay -->
        <div id="info-overlay" class="hidden">
          <div id="info-content"></div>
        </div>

        <!-- Cross-fade cover: snaps opaque at mode-switch start, fades out when
             new content is ready, hiding layout-reflow flashes. z-index below
             the spinner so loading state remains visible. -->
        <div id="transition-cover"></div>

        <!-- Empty-pane hint: content-active boots the invariant that exactly
             one element is always marked active. -->
        <div id="no-image-hint">
          <span>Select a file · Enter or double-click</span>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="state.js"></script>
  <script src="media-shared.js"></script>
  <script src="viewer-ui.js"></script>
  <script src="viewer-list.js"></script>
  <script src="viewer-selector.js"></script>
  <script src="viewer-audio.js"></script>
  <script src="viewer-queue-mgt.js"></script>
  <script src="viewer-load-context.js"></script>
  <script src="viewer-media.js"></script>
  <script src="viewer-media-imagelike.js"></script>
  <script src="viewer-media-image.js"></script>
  <script src="viewer-media-gif.js"></script>
  <script src="viewer-media-playable.js"></script>
  <script src="viewer-media-audio.js"></script>
  <script src="viewer-media-video.js"></script>
  <script src="viewer-media-queued-video.js"></script>
  <script src="viewer-content.js"></script>
  <script src="viewer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Viewer</title>
  <style>
    body {
      min-width: 220px;
      padding: 10px 14px 12px;
      background: #141414;
      color: #e0d8cc;
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #c8933a;
      letter-spacing: 0.05em;
    }
    p {
      margin: 0;
      font-size: 11px;
      color: #888;
      line-height: 1.6;
    }
    code {
      font-family: 'DM Mono', monospace;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 1px 4px;
      color: #e0aa58;
      font-size: 11px;
    }

    /* ── Queue section ──────────────────────────────────── */
    #queue-section { margin-top: 10px; }

    #queue-status {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
      min-height: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #queue-status.active { color: #c8933a; }
    #queue-status.suppressed { color: #667 }

    #queue-track {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #ccc;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #queue-time {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #666;
      margin-bottom: 8px;
    }

    #queue-controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .q-btn {
      background: #1c1c1c;
      border: 1px solid #333;
      color: #bbb;
      font-size: 14px;
      width: 28px;
      height: 28px;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .q-btn:hover { border-color: #666; color: #eee; }
    .q-btn:active { background: #282828; }
    #btn-play-pause { width: 36px; font-size: 16px; }

    hr { border: none; border-top: 1px solid #222; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>Media Viewer</h2>

  <!-- ── Audio queue status ── -->
  <div id="queue-section">
    <div id="queue-status">QUEUE EMPTY</div>
    <div id="queue-track"></div>
    <div id="queue-time"></div>
    <div id="queue-controls">
      <button class="q-btn" id="btn-prev"      title="Previous (or restart)">⏮</button>
      <button class="q-btn" id="btn-play-pause" title="Play / Pause (\\)">▶</button>
      <button class="q-btn" id="btn-next"      title="Next">⏭</button>
    </div>
  </div>

  <hr>

  <p>Open a directory from the command line:</p>
  <br>
  <p><code>media-open /path/to/dir</code></p>
  <br>
  <p><code>media-open /path/to/image.jpg</code></p>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Viewer</title>
  <style>
    body {
      min-width: 200px;
      padding: 12px 16px;
      background: #141414;
      color: #e0d8cc;
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #c8933a;
      letter-spacing: 0.05em;
    }
    p {
      margin: 0;
      font-size: 11px;
      color: #888;
      line-height: 1.6;
    }
    code {
      font-family: 'DM Mono', monospace;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 1px 4px;
      color: #e0aa58;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h2>Media Viewer</h2>
  <p>Open a directory from the command line:</p>
  <br>
  <p><code>media-open /path/to/dir</code></p>
  <br>
  <p><code>media-open /path/to/image.jpg</code></p>
</body>
</html>
